<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مشروع حسن الهندسي</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #ff4757; }
        .engine-box { position: relative; width: 100vw; height: 50vh; background: #222; overflow: hidden; }
        #engine-img { width: 100%; height: 100%; object-fit: contain; transition: 0.5s; }
        .dot { position: absolute; width: 25px; height: 25px; background: #ff4757; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #ff4757; cursor: pointer; }
        #info { padding: 20px; background: #111; min-height: 200px; }
        .title { color: #ff4757; font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        .back-btn { display: none; background: #444; color: #fff; border: none; padding: 10px 20px; margin-top: 15px; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.2rem; color: #ff4757; font-weight: bold;">تشريح المحرك الهندسي</div>
    <div style="font-size: 0.8rem; color: #888;">إعداد المهندس: حسن</div>
</header>

<div class="engine-box">
    <img id="engine-img" src="https://images.pexels.com/photos/190574/pexels-photo-190574.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" alt="Engine">
    
    <div class="dot" style="top: 40%; left: 50%;" onclick="zoom('الكور والحشوة', 'تشمل السكبات (شفتات اللفات) واللفات والبساتم اللي تولد الحركة.')"></div>
    <div class="dot" style="top: 30%; left: 80%;" onclick="zoom('الفيوزات والكهرباء', 'مثل ما قالت نبأ، هي حماية السيارة؛ يطگ الفيوز حتى يحمي القطع الغالية.')"></div>
    <div class="dot" style="top: 70%; left: 30%;" onclick="zoom('منظومة التبريد', 'تشمل الراديتر والدبة ومضخة المي حتى المكينة ما تحمى.')"></div>
</div>

<div id="info">
    <div id="part-name" class="title">اضغط على النقاط الحمراء</div>
    <div id="part-desc">استكشف أجزاء البنيد بالتفصيل...</div>
    <button id="back" class="back-btn" onclick="resetView()">رجوع للصورة الكاملة</button>
</div>

<script>
    function zoom(name, desc) {
        document.getElementById('part-name').innerText = name;
        document.getElementById('part-desc').innerText = desc;
        document.getElementById('engine-img').style.transform = "scale(1.8)";
        document.getElementById('back').style.display = "block";
    }
    function resetView() {
        document.getElementById('engine-img').style.transform = "scale(1)";
        document.getElementById('part-name').innerText = "اضغط على النقاط الحمراء";
        document.getElementById('part-desc').innerText = "استكشف أجزاء البنيد بالتفصيل...";
        document.getElementById('back').style.display = "none";
    }
</script>

</body>
</html>
