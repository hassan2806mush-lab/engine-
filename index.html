<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشريح المحرك - حسن</title>
    <style>
        :root { --accent: #ff4757; --bg: #0f0f0f; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); color: #ecf0f1; text-align: center; margin: 0; padding: 10px; }
        .viewport { position: relative; width: 100%; max-width: 600px; margin: 15px auto; border: 2px solid #333; border-radius: 15px; overflow: hidden; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #engine-display { width: 100%; display: block; transition: all 0.7s ease-in-out; }
        .hotspot { position: absolute; width: 20px; height: 20px; background: var(--accent); border: 2px solid #fff; border-radius: 50%; cursor: pointer; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        #detail-panel { margin-top: 15px; padding: 15px; background: #1a1a1a; border-radius: 12px; display: none; border: 1px solid var(--accent); }
        .back-btn { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        ul { list-style: none; padding: 0; text-align: right; }
        li { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; }
    </style>
</head>
<body>

    <h2 style="color:var(--accent)">🛠️ تشريح المحرك الهندسي (بالعراقي)</h2>
    
    <div class="viewport">
        <img id="engine-display" src="https://images.unsplash.com/photo-1597766353939-93725666060c?q=80&w=1000" alt="Engine">
        <div id="spots-container"></div>
    </div>

    <div id="detail-panel">
        <h3 id="part-title" style="color:var(--accent)"></h3>
        <div id="sub-list"></div>
        <button class="back-btn" onclick="resetApp()">رجوع للكل</button>
    </div>

    <script>
        const engineData = {
            main: [
                { id: 'core', name: 'الكور (قلب المكينة)', x: '50%', y: '40%' },
                { id: 'electrical', name: 'المنظومة الكهربائية', x: '80%', y: '30%' },
                { id: 'belts', name: 'القوايش والحركة', x: '20%', y: '50%' }
            ],
            sub: {
                core: [
                    { n: 'السكبات', d: 'شفتات حديد صلب تفتح اللفات.' },
                    { n: 'اللفات', d: 'بوابات الهوى والبنزين والدخان.' },
                    { n: 'البساتم', d: 'اللي تصعد وتنزل وتولد القوة.' },
                    { n: 'البلكات', d: 'اللي تنطي الشرارة (القدحة).' }
                ],
                electrical: [
                    { n: 'علبة الفيوزات', d: 'صندوق الحماية (يطگ الفيوز قبل لا تحترك القطعة).' },
                    { n: 'الدينامو', d: 'المسؤول عن شحن الباتري وتشغيل الكهرباء.' },
                    { n: 'الباتري', d: 'مخزن الطاقة الأساسي.' }
                ],
                belts: [
                    { n: 'قايش التايمن', d: 'أخطر قايش، يربط السكبات بالكرنك.' },
                    { n: 'قايش المروحة', d: 'يشغل الدينامو ومضخة المي.' }
                ]
            }
        };

        function renderMain() {
            const container = document.getElementById('spots-container');
            container.innerHTML = '';
            engineData.main.forEach(p => {
                const d = document.createElement('div');
                d.className = 'hotspot';
                d.style.left = p.x; d.style.top = p.y;
                d.onclick = () => {
                    document.getElementById('engine-display').style.transform = `scale(2.5)`;
                    document.getElementById('engine-display').style.transformOrigin = `${p.x} ${p.y}`;
                    document.getElementById('detail-panel').style.display = 'block';
                    document.getElementById('part-title').innerText = p.name;
                    document.getElementById('sub-list').innerHTML = '<ul>' + 
                        engineData.sub[p.id].map(s => `<li><b>${s.n}:</b> ${s.d}</li>`).join('') + '</ul>';
                    container.innerHTML = '';
                };
                container.appendChild(d);
            });
        }

        function resetApp() {
            document.getElementById('engine-display').style.transform = 'scale(1)';
            document.getElementById('detail-panel').style.display = 'none';
            renderMain();
        }

        renderMain();
    </script>
</body>
</html>
